<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🗓️ تقویم شمسی</title>
    <script src="https://cdn.jsdelivr.net/npm/jalaali-js@1.2.6/dist/jalaali.js">
    </script>
    <style>
        /* ============================
                   RESET & BASE
                ============================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            direction: rtl;
        }

        .container {
            background: #111;
            border: 2px solid #00ff41;
            border-radius: 24px;
            padding: 24px 20px 20px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 0 60px rgba(0, 255, 65, 0.04);
            color: #aaa;
        }

        /* ============================
                   HEADER
                ============================ */
        .header {
            text-align: center;
            margin-bottom: 18px;
        }

        .header h1 {
            color: #00ff41;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header .sub {
            color: #666;
            font-size: 11px;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        .header .sub span {
            color: #00ff41;
        }

        /* ============================
                   MONTH NAVIGATION
                ============================ */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 12px 4px;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 16px;
        }

        .nav .month-year {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav button {
            background: transparent;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #888;
            font-size: 20px;
            padding: 4px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            line-height: 1.6;
            touch-action: manipulation;
        }

        .nav button:hover {
            border-color: #00ff41;
            color: #00ff41;
        }

        .nav button:active {
            transform: scale(0.92);
        }

        .nav .today-btn {
            font-size: 12px;
            padding: 4px 12px;
            border-color: #333;
            color: #555;
        }

        .nav .today-btn:hover {
            border-color: #00ff41;
            color: #00ff41;
        }

        /* ============================
                   WEEKDAY HEADERS
                ============================ */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            text-align: center;
            color: #555;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .weekdays .holiday {
            color: #ff4444;
        }

        /* ============================
                   DAYS GRID
                ============================ */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #aaa;
            background: #0d0d0d;
            border: 2px solid transparent;
            transition: all 0.15s ease;
            cursor: pointer;
            user-select: none;
        }

        .day-cell:hover {
            border-color: #333;
        }

        .day-cell.other-month {
            color: #333;
        }

        .day-cell.today {
            border-color: #00ff41;
            color: #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.04);
        }

        .day-cell.friday {
            color: #ff6b6b;
        }

        .day-cell.selected {
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.08);
        }

        /* ============================
                   INFO BOX
                ============================ */
        .info-box {
            margin-top: 16px;
            padding: 12px 14px;
            background: #0d0d0d;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .info-box .label {
            color: #666;
            font-size: 12px;
        }

        .info-box .value {
            color: #00ff41;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        /* ============================
                   SELECTED DATE DISPLAY
                ============================ */
        .selected-display {
            margin-top: 10px;
            padding: 8px 14px;
            background: #0a0a0a;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .selected-display .sel-date {
            color: #ffd700;
            font-weight: 600;
        }

        /* ============================
                   FOOTER
                ============================ */
        .footer {
            text-align: center;
            color: #222;
            font-size: 9px;
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid #111;
            letter-spacing: 0.5px;
        }

        .footer span {
            color: #00ff41;
        }

        /* ============================
                   RESPONSIVE
                ============================ */
        @media (max-width: 420px) {
            .container {
                padding: 16px 12px 14px;
            }

            .header h1 {
                font-size: 20px;
            }

            .nav .month-year {
                font-size: 15px;
            }

            .nav button {
                font-size: 17px;
                padding: 2px 10px;
            }

            .day-cell {
                font-size: 13px;
                border-radius: 8px;
            }

            .info-box {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }
        }

        @media (max-width: 360px) {
            .day-cell {
                font-size: 11px;
                border-radius: 6px;
            }

            .weekdays {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <h1>🗓️ تقویم شمسی</h1>
            <div class="sub">by <span>KnoX</span> | Good Luck &lt;3</div>
        </div>

        <!-- NAVIGATION -->
        <div class="nav">
            <button id="prevMonthBtn">‹</button>
            <span class="month-year" id="monthYearDisplay">تیر ۱۴۰۵</span>
            <button id="nextMonthBtn">›</button>
            <button class="today-btn" id="todayBtn">امروز</button>
        </div>

        <!-- WEEKDAYS -->
        <div class="weekdays">
            <span class="holiday">ش</span>
            <span>ی</span>
            <span>د</span>
            <span>س</span>
            <span>چ</span>
            <span>پ</span>
            <span class="holiday">ج</span>
        </div>

        <!-- DAYS -->
        <div class="days-grid" id="daysGrid"></div>

        <!-- SELECTED DATE DISPLAY -->
        <div class="selected-display" id="selectedDisplay">
            📅 تاریخ انتخاب‌شده: <span class="sel-date" id="selectedDateText">هیچ</span>
        </div>

        <!-- INFO BOX -->
        <div class="info-box">
            <span class="label">📅 تاریخ امروز:</span>
            <span class="value" id="todayDateDisplay">۱۴۰۵/۰۴/۰۶</span>
            <span class="label">📆 روز هفته:</span>
            <span class="value" id="weekdayDisplay">شنبه</span>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span>#Dillimore Projects by KnoX</span> | Good Luck &lt;3
        </div>

    </div>

    <script>
        // ================================================================
        // 🗓️ PERSIAN CALENDAR  –  by KnoX  –  Version 2.3.0
        // ================================================================
        // COMPLETE PERSIAN CALENDAR WITH ACCURATE LEAP YEAR ALGORITHM
        // ================================================================

        // ---------- DOM ----------
        const monthYearDisplay = document.getElementById('monthYearDisplay');
        const daysGrid = document.getElementById('daysGrid');
        const todayDateDisplay = document.getElementById('todayDateDisplay');
        const weekdayDisplay = document.getElementById('weekdayDisplay');
        const selectedDateText = document.getElementById('selectedDateText');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');
        const todayBtn = document.getElementById('todayBtn');

        // ---------- STATE ----------
        let currentJYear = 1405;
        let currentJMonth = 3;
        let selectedDate = null;

        // ---------- PERSIAN CALENDAR CONSTANTS ----------
        const MONTH_NAMES = [
            'فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور',
            'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'
        ];

        const PERSIAN_WEEKDAYS = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];

        // ---------- PERSIAN CALENDAR ALGORITHM ----------
        // The Persian calendar is based on a 33-year cycle with 8 leap years.
        // Leap years occur in years 1, 5, 9, 13, 17, 22, 26, 30 of each 33-year cycle.
        // The base year 1 corresponds to 622 CE (Hegira).

        function isLeapYear(jy) {
            // Accurate Persian leap year algorithm
            // Based on the 33-year cycle used in the official Persian calendar
            const y = jy + 2346; // Adjust to the cycle base
            return (y * 8 + 4) % 33 < 8;
        }

        function getDaysInMonth(jy, jm) {
            // jm is 0-based (0 = Farvardin, 11 = Esfand)
            // First 6 months (Farvardin to Shahrivar): 31 days
            // Next 5 months (Mehr to Bahman): 30 days
            // Esfand: 29 days normally, 30 in leap years
            if (jm < 6) {
                return 31;
            } else if (jm < 11) {
                return 30;
            } else {
                return isLeapYear(jy) ? 30 : 29;
            }
        }

        function getTotalDaysInYear(jy) {
            // Total days in a Persian year (365 or 366)
            let total = 0;
            for (let jm = 0; jm < 12; jm++) {
                total += getDaysInMonth(jy, jm);
            }
            return total;
        }

        function getFirstDayOfMonth(jy, jm) {
            // Return the day of week for the first day of the month
            // 0 = Saturday, 6 = Friday
            // Using the known reference: 1405/04/01 = Thursday? Let's compute with jalaali-js
            const g = jalaali.toGregorian(jy, jm + 1, 1);
            const date = new Date(g.gy, g.gm - 1, g.gd);
            const dayOfWeek = date.getDay(); // 0=Sunday, 6=Saturday
            // Map to Persian week: 0=Saturday, 6=Friday
            return (dayOfWeek + 1) % 7;
        }

        function getWeekdayName(jy, jm, jd) {
            const g = jalaali.toGregorian(jy, jm + 1, jd);
            const date = new Date(g.gy, g.gm - 1, g.gd);
            const dayOfWeek = date.getDay();
            let idx = (dayOfWeek + 1) % 7;
            return PERSIAN_WEEKDAYS[idx];
        }

        function getToday() {
            const now = new Date();
            const j = jalaali.toJalaali(now.getFullYear(), now.getMonth() + 1, now.getDate());
            return { jy: j.jy, jm: j.jm - 1, jd: j.jd };
        }

        // ---------- RENDER CALENDAR ----------
        function renderCalendar(jYear, jMonth) {
            const daysInMonth = getDaysInMonth(jYear, jMonth);
            const firstDayOfWeek = getFirstDayOfMonth(jYear, jMonth);
            const today = getToday();

            let prevMonthDays;
            if (jMonth === 0) {
                prevMonthDays = getDaysInMonth(jYear - 1, 11);
            } else {
                prevMonthDays = getDaysInMonth(jYear, jMonth - 1);
            }

            const offset = firstDayOfWeek;
            const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
            const days = [];

            for (let i = 0; i < totalCells; i++) {
                let day;
                let isOtherMonth = false;
                let cellJYear = jYear;
                let cellJMonth = jMonth;

                if (i < offset) {
                    const dayNum = prevMonthDays - offset + i + 1;
                    day = dayNum;
                    isOtherMonth = true;
                    if (jMonth === 0) {
                        cellJYear = jYear - 1;
                        cellJMonth = 11;
                    } else {
                        cellJMonth = jMonth - 1;
                    }
                } else if (i >= offset + daysInMonth) {
                    const dayNum = i - offset - daysInMonth + 1;
                    day = dayNum;
                    isOtherMonth = true;
                    if (jMonth === 11) {
                        cellJYear = jYear + 1;
                        cellJMonth = 0;
                    } else {
                        cellJMonth = jMonth + 1;
                    }
                } else {
                    day = i - offset + 1;
                }

                const dayOfWeek = (i % 7);
                const isFriday = (dayOfWeek === 6);
                const isToday = (jYear === today.jy && jMonth === today.jm && day === today.jd && !isOtherMonth);
                const isSelected = (selectedDate &&
                    cellJYear === selectedDate.jy &&
                    cellJMonth === selectedDate.jm &&
                    day === selectedDate.jd &&
                    !isOtherMonth);

                days.push({
                    day,
                    isOtherMonth,
                    isFriday,
                    isToday,
                    isSelected,
                    jYear: cellJYear,
                    jMonth: cellJMonth,
                    jd: day
                });
            }

            // Render
            daysGrid.innerHTML = '';
            days.forEach(cell => {
                const div = document.createElement('div');
                div.className = 'day-cell';
                if (cell.isOtherMonth) div.classList.add('other-month');
                if (cell.isFriday) div.classList.add('friday');
                if (cell.isToday) div.classList.add('today');
                if (cell.isSelected) div.classList.add('selected');
                div.textContent = cell.day;

                div.addEventListener('click', function() {
                    if (cell.isOtherMonth) {
                        renderCalendar(cell.jYear, cell.jMonth);
                        setTimeout(() => {
                            selectDate(cell.jYear, cell.jMonth, cell.jd);
                        }, 10);
                    } else {
                        selectDate(cell.jYear, cell.jMonth, cell.jd);
                    }
                });

                daysGrid.appendChild(div);
            });

            // Update displays
            monthYearDisplay.textContent = `${getMonthName(jMonth)} ${jYear}`;

            const todayJ = getToday();
            const todayDateStr =
                `${todayJ.jy}/${String(todayJ.jm + 1).padStart(2, '0')}/${String(todayJ.jd).padStart(2, '0')}`;
            todayDateDisplay.textContent = todayDateStr;
            weekdayDisplay.textContent = getWeekdayName(todayJ.jy, todayJ.jm, todayJ.jd);

            if (selectedDate) {
                const selStr =
                    `${selectedDate.jy}/${String(selectedDate.jm + 1).padStart(2, '0')}/${String(selectedDate.jd).padStart(2, '0')}`;
                const wdSel = getWeekdayName(selectedDate.jy, selectedDate.jm, selectedDate.jd);
                selectedDateText.textContent = `${selStr} (${wdSel})`;
            } else {
                selectedDateText.textContent = 'هیچ';
            }

            currentJYear = jYear;
            currentJMonth = jMonth;
        }

        // ---------- SELECT DATE ----------
        function selectDate(jy, jm, jd) {
            selectedDate = { jy, jm, jd };
            renderCalendar(currentJYear, currentJMonth);
        }

        // ---------- NAVIGATION ----------
        function goToToday() {
            const today = getToday();
            selectedDate = null;
            renderCalendar(today.jy, today.jm);
            setTimeout(() => {
                selectDate(today.jy, today.jm, today.jd);
            }, 10);
        }

        function goToPrevMonth() {
            let newMonth = currentJMonth - 1;
            let newYear = currentJYear;
            if (newMonth < 0) {
                newMonth = 11;
                newYear--;
            }
            selectedDate = null;
            renderCalendar(newYear, newMonth);
        }

        function goToNextMonth() {
            let newMonth = currentJMonth + 1;
            let newYear = currentJYear;
            if (newMonth > 11) {
                newMonth = 0;
                newYear++;
            }
            selectedDate = null;
            renderCalendar(newYear, newMonth);
        }

        // ---------- EVENT LISTENERS ----------
        prevMonthBtn.addEventListener('click', goToPrevMonth);
        nextMonthBtn.addEventListener('click', goToNextMonth);
        todayBtn.addEventListener('click', goToToday);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { goToNextMonth();
                e.preventDefault(); }
            if (e.key === 'ArrowLeft') { goToPrevMonth();
                e.preventDefault(); }
            if (e.key === 't' || e.key === 'T') { goToToday();
                e.preventDefault(); }
        });

        // ---------- INIT ----------
        const today = getToday();
        currentJYear = today.jy;
        currentJMonth = today.jm;
        renderCalendar(currentJYear, currentJMonth);
        setTimeout(() => {
            selectDate(today.jy, today.jm, today.jd);
        }, 50);

        console.log('🗓️ Persian Calendar v2.3.0 (Complete) by KnoX | Good Luck <3');
        console.log('📅 Today:', today.jy, getMonthName(today.jm), today.jd);
        console.log('📆 Days in current month:', getDaysInMonth(today.jy, today.jm));
        console.log('📆 Leap year?', isLeapYear(today.jy) ? 'Yes (366 days)' : 'No (365 days)');
        console.log('📆 Total days in year:', getTotalDaysInYear(today.jy));
    </script>

</body>
</html>
