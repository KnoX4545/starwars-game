<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>تقویم شمسی - دیلیمور</title>
    <link rel="icon" type="image/x-icon" href="https://uploadkon.ir/uploads/e38e27_26calendar-icon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/jalaali-js@1.2.6/dist/jalaali.js">
    </script>

    <style>
        /* ============================================================
                   CSS VARIABLES
                ============================================================ */
        :root {
            --bg-body: #0f0e17;
            --bg-container: #1a1932;
            --bg-card: #222145;
            --bg-card-hover: #2a2955;
            --bg-card-border: #2a2a4a;
            --text-primary: #fffffe;
            --text-secondary: #a7a9be;
            --text-muted: #6c6e8a;
            --accent-1: #ff8906;
            --accent-2: #e53170;
            --accent-3: #6246d4;
            --accent-glow: rgba(255, 137, 6, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 16px 48px rgba(255, 137, 6, 0.06);
            --border-color: #2a2a4a;
            --radius: 18px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Vazirmatn', 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* ============================================================
                   RESET & BASE
                ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            direction: rtl;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .container {
            background: var(--bg-container);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius);
            padding: 24px 20px 20px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
        }

        /* ============================================================
                   HEADER
                ============================================================ */
        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header .badge {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent-1);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 2px 14px;
            border-radius: 100px;
            border: 1px solid var(--accent-glow);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .sub {
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ============================================================
                   NAVIGATION
                ============================================================ */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 2px 12px 2px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 14px;
        }

        .nav .month-year {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav button {
            background: transparent;
            border: 1px solid var(--bg-card-border);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 20px;
            padding: 4px 14px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font);
            line-height: 1.6;
            touch-action: manipulation;
        }

        .nav button:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        .nav button:active {
            transform: scale(0.92);
        }

        .nav .today-btn {
            font-size: 12px;
            padding: 4px 12px;
            border-color: var(--bg-card-border);
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav .today-btn:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        /* ============================================================
                   WEEKDAYS
                ============================================================ */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .weekdays .holiday {
            color: var(--accent-2);
        }

        /* ============================================================
                   DAYS GRID
                ============================================================ */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 2px solid transparent;
            transition: all var(--transition);
            cursor: pointer;
            user-select: none;
        }

        .day-cell:hover {
            border-color: var(--accent-1);
            background: var(--bg-card-hover);
        }

        .day-cell.other-month {
            color: var(--text-muted);
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        .day-cell.today {
            border-color: var(--accent-1);
            color: var(--accent-1);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .day-cell.friday {
            color: var(--accent-2);
        }

        .day-cell.selected {
            border-color: var(--accent-1);
            color: var(--text-primary);
            background: var(--accent-glow);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        /* ============================================================
                   INFO BOX
                ============================================================ */
        .info-box {
            margin-top: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .info-box .label {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
        }

        .info-box .value {
            color: var(--accent-1);
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        /* ============================================================
                   SELECTED DISPLAY
                ============================================================ */
        .selected-display {
            margin-top: 10px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .selected-display .sel-date {
            color: var(--accent-1);
            font-weight: 700;
        }

        /* ============================================================
                   FOOTER
                ============================================================ */
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 9px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            letter-spacing: 0.3px;
            opacity: 0.5;
        }

        .footer .brand {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }

        /* ============================================================
                   RESPONSIVE
                ============================================================ */
        @media (max-width: 440px) {
            .container {
                padding: 18px 14px 14px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .nav .month-year {
                font-size: 16px;
            }

            .nav button {
                font-size: 17px;
                padding: 2px 10px;
            }

            .day-cell {
                font-size: 13px;
                border-radius: 10px;
            }

            .info-box {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .info-box .value {
                font-size: 13px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 14px 10px 12px;
            }

            .header h1 {
                font-size: 18px;
            }

            .day-cell {
                font-size: 11px;
                border-radius: 8px;
            }

            .weekdays {
                font-size: 10px;
            }

            .nav .month-year {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="badge">✦ تقویم</div>
            <h1>🗓️ <span class="highlight">تقویم شمسی</span></h1>
            <div class="sub">Persian (Jalali) Calendar</div>
        </div>

        <!-- NAVIGATION -->
        <div class="nav">
            <button id="prevMonthBtn">‹</button>
            <span class="month-year" id="monthYearDisplay">خرداد ۱۴۰۵</span>
            <button id="nextMonthBtn">›</button>
            <button class="today-btn" id="todayBtn">امروز</button>
        </div>

        <!-- WEEKDAYS -->
        <div class="weekdays">
            <span class="holiday">ش</span>
            <span>ی</span>
            <span>د</span>
            <span>س</span>
            <span>چ</span>
            <span>پ</span>
            <span class="holiday">ج</span>
        </div>

        <!-- DAYS -->
        <div class="days-grid" id="daysGrid"></div>

        <!-- SELECTED DATE -->
        <div class="selected-display">
            📅 تاریخ انتخاب‌شده: <span class="sel-date" id="selectedDateText">هیچ</span>
        </div>

        <!-- INFO -->
        <div class="info-box">
            <span class="label">📅 تاریخ امروز:</span>
            <span class="value" id="todayDateDisplay">۱۴۰۵/۰۴/۰۶</span>
            <span class="label">📆 روز هفته:</span>
            <span class="value" id="weekdayDisplay">شنبه</span>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span class="brand">Dillimore</span> — ساخته شده با ❤️ توسط <span class="brand">KnoX</span>
            <br>© ۲۰۲۴-۲۰۲۶ تیم دیلیمور. تمامی حقوق محفوظ است.
        </div>

    </div>

    <script>
        // ================================================================
        // 🗓️ PERSIAN CALENDAR  –  by KnoX  –  Version 3.1.0
        // ================================================================

        // ---------- DOM ----------
        const monthYearDisplay = document.getElementById('monthYearDisplay');
        const daysGrid = document.getElementById('daysGrid');
        const todayDateDisplay = document.getElementById('todayDateDisplay');
        const weekdayDisplay = document.getElementById('weekdayDisplay');
        const selectedDateText = document.getElementById('selectedDateText');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');
        const todayBtn = document.getElementById('todayBtn');

        // ---------- STATE ----------
        let currentJYear = 1405;
        let currentJMonth = 3; // 0 = Farvardin, 3 = Tir
        let selectedDate = null;

        // ---------- HELPERS ----------
        function getMonthName(jMonth) {
            const names = [
                'فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور',
                'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'
            ];
            return names[jMonth] || '';
        }

        function getWeekdayName(jy, jm, jd) {
            const g = jalaali.toGregorian(jy, jm + 1, jd);
            const date = new Date(g.gy, g.gm - 1, g.gd);
            const dayOfWeek = date.getDay();
            const persianWeek = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
            let idx = (dayOfWeek + 1) % 7;
            return persianWeek[idx];
        }

        function getToday() {
            const now = new Date();
            const j = jalaali.toJalaali(now.getFullYear(), now.getMonth() + 1, now.getDate());
            return { jy: j.jy, jm: j.jm - 1, jd: j.jd };
        }

        function getDaysInMonth(jy, jm) {
            return jalaali.jalaaliMonthLength(jy, jm + 1);
        }

        // ---------- RENDER ----------
        function renderCalendar(jYear, jMonth) {
            const firstDayGreg = jalaali.toGregorian(jYear, jMonth + 1, 1);
            const firstDate = new Date(firstDayGreg.gy, firstDayGreg.gm - 1, firstDayGreg.gd);

            const daysInMonth = getDaysInMonth(jYear, jMonth);
            const firstDayOfWeek = firstDate.getDay();

            let offset;
            if (firstDayOfWeek === 6) offset = 0;
            else if (firstDayOfWeek === 5) offset = 6;
            else offset = firstDayOfWeek + 1;

            const today = getToday();

            const days = [];

            for (let i = 0; i < daysInMonth; i++) {
                const dayNum = i + 1;
                const cellDate = new Date(firstDate);
                cellDate.setDate(cellDate.getDate() + i);
                const dayOfWeekJS = cellDate.getDay();
                const isFriday = (dayOfWeekJS === 5);

                const isToday = (jYear === today.jy && jMonth === today.jm && dayNum === today.jd);

                const isSelected = (selectedDate &&
                    jYear === selectedDate.jy &&
                    jMonth === selectedDate.jm &&
                    dayNum === selectedDate.jd);

                days.push({
                    day: dayNum,
                    isFriday,
                    isToday,
                    isSelected,
                    jYear: jYear,
                    jMonth: jMonth,
                    jd: dayNum,
                    weekIndex: (offset + i) % 7
                });
            }

            const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
            const grid = [];

            for (let i = 0; i < totalCells; i++) {
                if (i < offset) {
                    grid.push({ empty: true });
                } else if (i >= offset + daysInMonth) {
                    grid.push({ empty: true });
                } else {
                    const dayIndex = i - offset;
                    grid.push(days[dayIndex]);
                }
            }

            daysGrid.innerHTML = '';
            grid.forEach(cell => {
                const div = document.createElement('div');
                div.className = 'day-cell';

                if (cell.empty) {
                    div.classList.add('other-month');
                    div.textContent = '';
                } else {
                    if (cell.isFriday) div.classList.add('friday');
                    if (cell.isToday) div.classList.add('today');
                    if (cell.isSelected) div.classList.add('selected');
                    div.textContent = cell.day;

                    div.addEventListener('click', function() {
                        selectDate(cell.jYear, cell.jMonth, cell.jd);
                    });
                }

                daysGrid.appendChild(div);
            });

            monthYearDisplay.textContent = `${getMonthName(jMonth)} ${jYear}`;

            const todayJ = getToday();
            const todayDateStr =
                `${todayJ.jy}/${String(todayJ.jm + 1).padStart(2, '0')}/${String(todayJ.jd).padStart(2, '0')}`;
            todayDateDisplay.textContent = todayDateStr;
            const wd = getWeekdayName(todayJ.jy, todayJ.jm, todayJ.jd);
            weekdayDisplay.textContent = wd;

            if (selectedDate) {
                const selStr =
                    `${selectedDate.jy}/${String(selectedDate.jm + 1).padStart(2, '0')}/${String(selectedDate.jd).padStart(2, '0')}`;
                const wdSel = getWeekdayName(selectedDate.jy, selectedDate.jm, selectedDate.jd);
                selectedDateText.textContent = `${selStr} (${wdSel})`;
            } else {
                selectedDateText.textContent = 'هیچ';
            }

            currentJYear = jYear;
            currentJMonth = jMonth;
        }

        function selectDate(jy, jm, jd) {
            selectedDate = { jy, jm, jd };
            renderCalendar(currentJYear, currentJMonth);
        }

        function goToToday() {
            const today = getToday();
            selectedDate = null;
            renderCalendar(today.jy, today.jm);
            setTimeout(() => {
                selectDate(today.jy, today.jm, today.jd);
            }, 10);
        }

        function goToPrevMonth() {
            let newMonth = currentJMonth - 1;
            let newYear = currentJYear;
            if (newMonth < 0) {
                newMonth = 11;
                newYear--;
            }
            selectedDate = null;
            renderCalendar(newYear, newMonth);
        }

        function goToNextMonth() {
            let newMonth = currentJMonth + 1;
            let newYear = currentJYear;
            if (newMonth > 11) {
                newMonth = 0;
                newYear++;
            }
            selectedDate = null;
            renderCalendar(newYear, newMonth);
        }

        // ---------- EVENTS ----------
        prevMonthBtn.addEventListener('click', goToPrevMonth);
        nextMonthBtn.addEventListener('click', goToNextMonth);
        todayBtn.addEventListener('click', goToToday);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { goToNextMonth();
                e.preventDefault(); }
            if (e.key === 'ArrowLeft') { goToPrevMonth();
                e.preventDefault(); }
            if (e.key === 't' || e.key === 'T') { goToToday();
                e.preventDefault(); }
        });

        // ---------- INIT ----------
        const today = getToday();
        currentJYear = today.jy;
        currentJMonth = today.jm;
        renderCalendar(currentJYear, currentJMonth);
        setTimeout(() => {
            selectDate(today.jy, today.jm, today.jd);
        }, 50);

        console.log('🗓️ Persian Calendar v3.1.0 by KnoX | Good Luck <3');
    </script>

</body>
</html>
