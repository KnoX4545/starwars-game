<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dillimore Projects</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://uploadkon.ir/uploads/73ca26_26download-1-.png">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* ===== HEADER ===== */
        .header {
            margin-bottom: 40px;
        }
        .header h1 {
            color: #00ff41;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .header .sub {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .header .sub span {
            color: #00ff41;
        }

        /* ===== PROJECT GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* ===== PROJECT CARD ===== */
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 30px 20px;
            text-decoration: none;
            color: #aaa;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, transparent 40%, #00ff41 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .card:hover::before {
            opacity: 1;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #00ff41;
            box-shadow: 0 10px 40px rgba(0, 255, 65, 0.05);
            background: #151515;
        }
        .card:active {
            transform: scale(0.97);
        }

        /* Card Icon */
        .card .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 16px;
            background: #1a1a1a;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }
        .card:hover .icon {
            border-color: #00ff41;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.05);
        }
        /* Specific icon colors */
        .card.starwars .icon { color: #ffd700; }
        .card.snake .icon { color: #00ff41; }
        .card.calculator .icon { color: #4a9eff; }

        /* Card Title */
        .card .name {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .card .desc {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
        .card .badge {
            margin-top: 12px;
            font-size: 11px;
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 4px 14px;
            border-radius: 20px;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .card:hover .badge {
            opacity: 1;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 50px;
            color: #333;
            font-size: 12px;
            letter-spacing: 1px;
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
        }
        .footer span {
            color: #00ff41;
        }
        .footer .version {
            color: #444;
            font-size: 10px;
            margin-top: 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .header h1 {
                font-size: 28px;
            }
            .card {
                padding: 24px 16px;
            }
            .card .icon {
                width: 64px;
                height: 64px;
                font-size: 32px;
            }
            .card .name {
                font-size: 17px;
            }
        }
        @media (max-width: 450px) {
            .grid {
                grid-template-columns: 1fr;
                max-width: 320px;
                margin-left: auto;
                margin-right: auto;
            }
            .header h1 {
                font-size: 24px;
            }
            .card .icon {
                width: 56px;
                height: 56px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <h1>✦ Dillimore Projects ✦</h1>
            <div class="sub">by <span>KnoX</span>  |  Good Luck &lt;3</div>
        </div>

        <!-- PROJECT GRID -->
        <div class="grid">

            <!-- StarWars -->
            <a href="https://knox4545.github.io/starwars-game/StarWars.html" class="card starwars">
                <div class="icon">⚔️</div>
                <div class="name">StarWars</div>
                <div class="desc">Text-based adventure in space</div>
                <div class="badge">▶ Play Now</div>
            </a>

            <!-- Snake -->
            <a href="https://knox4545.github.io/snake-game/Snake.html" class="card snake">
                <div class="icon">🐍</div>
                <div class="name">Snake</div>
                <div class="desc">Classic snake game</div>
                <div class="badge">▶ Play Now</div>
            </a>

            <!-- Calculator -->
            <a href="https://knox4545.github.io/calculator/Calculator.html" class="card calculator">
                <div class="icon">🧮</div>
                <div class="name">Calculator</div>
                <div class="desc">Advanced scientific calculator</div>
                <div class="badge">▶ Use Now</div>
            </a>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span>#Dillimore Projects by KnoX</span>  |  Good Luck &lt;3<br>
            <div class="version">Version 1.0.0</div>
        </div>

    </div>
</body>
</html>
