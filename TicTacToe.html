<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tic-Tac-Toe - Dillimore</title>
    <link rel="icon" type="image/x-icon" href="https://uploadkon.ir/uploads/8e6b27_26Dillimore-TicTacToe.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
                   CSS VARIABLES
                ============================================================ */
        :root {
            --bg-body: #0f0e17;
            --bg-container: #1a1932;
            --bg-card: #222145;
            --bg-card-hover: #2a2955;
            --bg-card-border: #2a2a4a;
            --text-primary: #fffffe;
            --text-secondary: #a7a9be;
            --text-muted: #6c6e8a;
            --accent-1: #ff8906;
            --accent-2: #e53170;
            --accent-3: #6246d4;
            --accent-glow: rgba(255, 137, 6, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 16px 48px rgba(255, 137, 6, 0.06);
            --border-color: #2a2a4a;
            --radius: 18px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ============================================================
                   RESET & BASE
                ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .container {
            background: var(--bg-container);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius);
            padding: 24px 20px 20px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
        }

        /* ============================================================
                   HEADER
                ============================================================ */
        .header {
            text-align: center;
            margin-bottom: 14px;
        }

        .header .badge {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent-1);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 2px 14px;
            border-radius: 100px;
            border: 1px solid var(--accent-glow);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .sub {
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ============================================================
                   MODE SELECTOR
                ============================================================ */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin: 14px 0 12px;
            justify-content: center;
        }

        .mode-btn {
            padding: 8px 24px;
            background: transparent;
            border: 1px solid var(--bg-card-border);
            border-radius: 100px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font);
        }

        .mode-btn:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        .mode-btn.active {
            border-color: var(--accent-1);
            color: var(--accent-1);
            background: var(--accent-glow);
        }

        /* ============================================================
                   TURN INDICATOR
                ============================================================ */
        .turn-indicator {
            font-size: 17px;
            font-weight: 600;
            margin: 8px 0 14px;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .turn-indicator .x-turn {
            color: var(--accent-3);
        }

        .turn-indicator .o-turn {
            color: var(--accent-2);
        }

        .turn-indicator .winner {
            color: var(--accent-1);
        }

        /* ============================================================
                   BOARD
                ============================================================ */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-width: 340px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
        }

        .cell {
            background: var(--bg-card);
            border: 1px solid var(--bg-card-border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            aspect-ratio: 1 / 1;
            user-select: none;
        }

        .cell:hover {
            border-color: var(--accent-1);
            background: var(--bg-card-hover);
        }

        .cell.x {
            color: var(--accent-3);
            text-shadow: 0 0 40px rgba(98, 70, 212, 0.15);
        }

        .cell.o {
            color: var(--accent-2);
            text-shadow: 0 0 40px rgba(229, 49, 112, 0.15);
        }

        .cell.win-cell {
            border-color: var(--accent-1);
            box-shadow: 0 0 40px var(--accent-glow);
            background: var(--accent-glow);
        }

        .cell:active {
            transform: scale(0.93);
        }

        /* ============================================================
                   SCORE
                ============================================================ */
        .score {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 16px 0 12px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .score-item {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .score-item .num {
            font-weight: 700;
            font-size: 18px;
        }

        .score-item .num.x-score {
            color: var(--accent-3);
        }

        .score-item .num.o-score {
            color: var(--accent-2);
        }

        .score-item .num.draw-score {
            color: var(--text-muted);
        }

        /* ============================================================
                   BUTTONS
                ============================================================ */
        .btn-reset {
            margin-top: 12px;
            padding: 10px 36px;
            background: transparent;
            border: 2px solid var(--accent-1);
            border-radius: 100px;
            color: var(--accent-1);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font);
            letter-spacing: 0.5px;
        }

        .btn-reset:hover {
            background: var(--accent-1);
            color: var(--bg-body);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .btn-reset:active {
            transform: scale(0.95);
        }

        /* ============================================================
                   FOOTER
                ============================================================ */
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 9px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            letter-spacing: 0.3px;
            opacity: 0.5;
        }

        .footer .brand {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }

        /* ============================================================
                   RESPONSIVE
                ============================================================ */
        @media (max-width: 440px) {
            .container {
                padding: 18px 14px 14px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .cell {
                font-size: 40px;
                border-radius: 12px;
            }

            .board {
                max-width: 300px;
            }

            .turn-indicator {
                font-size: 15px;
            }

            .score {
                gap: 20px;
                padding: 10px 14px;
            }

            .score-item {
                font-size: 12px;
            }

            .score-item .num {
                font-size: 16px;
            }

            .mode-btn {
                font-size: 12px;
                padding: 6px 18px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 14px 10px 12px;
            }

            .header h1 {
                font-size: 18px;
            }

            .board {
                max-width: 240px;
            }

            .cell {
                font-size: 32px;
                border-radius: 10px;
            }

            .mode-btn {
                font-size: 10px;
                padding: 5px 14px;
            }

            .score {
                gap: 14px;
                padding: 8px 10px;
                flex-wrap: wrap;
            }

            .score-item {
                font-size: 11px;
            }

            .score-item .num {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="badge">✦ Classic</div>
            <h1>🎮 <span class="highlight">Tic-Tac-Toe</span></h1>
            <div class="sub">X vs O — Who will win?</div>
        </div>

        <!-- MODE SELECTOR -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="single" id="singleModeBtn">🤖 vs Bot</button>
            <button class="mode-btn" data-mode="multi" id="multiModeBtn">👥 2 Players</button>
        </div>

        <!-- TURN INDICATOR -->
        <div class="turn-indicator" id="turnIndicator">
            Turn: <span class="x-turn">❌</span>
        </div>

        <!-- BOARD -->
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <!-- SCORE -->
        <div class="score">
            <span class="score-item">❌ <span class="num x-score" id="xScore">0</span></span>
            <span class="score-item">🤝 <span class="num draw-score" id="drawScore">0</span></span>
            <span class="score-item">⭕ <span class="num o-score" id="oScore">0</span></span>
        </div>

        <!-- RESET -->
        <button class="btn-reset" id="resetBtn">🔄 New Game</button>

        <!-- FOOTER -->
        <div class="footer">
            <span class="brand">Dillimore</span> — Built with ❤️ by <span class="brand">KnoX</span>
            <br>© 2024-2026 Dillimore Team. All rights reserved.
        </div>

    </div>

    <script>
        // ================================================================
        // 🎮 TIC-TAC-TOE  –  by KnoX  –  Version 2.0.0
        // ================================================================

        // ---------- DOM ----------
        const cells = document.querySelectorAll('.cell');
        const turnIndicator = document.getElementById('turnIndicator');
        const xScoreEl = document.getElementById('xScore');
        const oScoreEl = document.getElementById('oScore');
        const drawScoreEl = document.getElementById('drawScore');
        const resetBtn = document.getElementById('resetBtn');
        const singleModeBtn = document.getElementById('singleModeBtn');
        const multiModeBtn = document.getElementById('multiModeBtn');

        // ---------- STATE ----------
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'x';
        let gameOver = false;
        let mode = 'single';
        let scores = { x: 0, o: 0, draw: 0 };

        // ---------- WIN PATTERNS ----------
        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        // ---------- INIT ----------
        function initGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'x';
            gameOver = false;
            renderBoard();
            updateTurnIndicator();
            if (mode === 'single' && currentPlayer === 'o') {
                setTimeout(robotMove, 400);
            }
        }

        // ---------- RENDER ----------
        function renderBoard() {
            cells.forEach((cell, index) => {
                cell.textContent = board[index];
                cell.className = 'cell';
                if (board[index] === 'x') cell.classList.add('x');
                else if (board[index] === 'o') cell.classList.add('o');
            });
        }

        function updateTurnIndicator() {
            if (gameOver) return;
            const playerName = currentPlayer === 'x' ? '❌' : '⭕';
            const className = currentPlayer === 'x' ? 'x-turn' : 'o-turn';
            turnIndicator.innerHTML = `Turn: <span class="${className}">${playerName}</span>`;
        }

        function showWinner(winner, winCells) {
            gameOver = true;
            if (winner === 'draw') {
                turnIndicator.innerHTML = '🤝 <span class="winner">Draw!</span>';
                scores.draw++;
                drawScoreEl.textContent = scores.draw;
                return;
            }
            const emoji = winner === 'x' ? '❌' : '⭕';
            const winnerName = winner === 'x' ? 'Player X' : 'Player O';
            turnIndicator.innerHTML = `🏆 <span class="winner">${winnerName} Wins! ${emoji}</span>`;

            if (winCells) {
                winCells.forEach(idx => {
                    cells[idx].classList.add('win-cell');
                });
            }

            if (winner === 'x') {
                scores.x++;
                xScoreEl.textContent = scores.x;
            } else {
                scores.o++;
                oScoreEl.textContent = scores.o;
            }
        }

        // ---------- CHECK WINNER ----------
        function checkWinner() {
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return { winner: board[a], winCells: pattern };
                }
            }
            if (board.every(cell => cell !== '')) {
                return { winner: 'draw', winCells: null };
            }
            return { winner: null, winCells: null };
        }

        // ---------- MAKE MOVE ----------
        function makeMove(index) {
            if (gameOver) return false;
            if (board[index] !== '') return false;

            board[index] = currentPlayer;
            renderBoard();

            const result = checkWinner();
            if (result.winner) {
                showWinner(result.winner, result.winCells);
                return true;
            }

            currentPlayer = currentPlayer === 'x' ? 'o' : 'x';
            updateTurnIndicator();

            if (mode === 'single' && currentPlayer === 'o' && !gameOver) {
                setTimeout(robotMove, 350);
            }

            return true;
        }

        // ---------- ROBOT (AI) ----------
        function robotMove() {
            if (gameOver) return;
            if (mode !== 'single') return;
            if (currentPlayer !== 'o') return;
            if (board.every(cell => cell !== '')) return;

            const emptyIndices = board
                .map((cell, idx) => cell === '' ? idx : null)
                .filter(idx => idx !== null);

            if (emptyIndices.length === 0) return;

            // 1. Win if possible
            for (const idx of emptyIndices) {
                board[idx] = 'o';
                const result = checkWinner();
                board[idx] = '';
                if (result.winner === 'o') {
                    makeMove(idx);
                    return;
                }
            }

            // 2. Block player's win
            for (const idx of emptyIndices) {
                board[idx] = 'x';
                const result = checkWinner();
                board[idx] = '';
                if (result.winner === 'x') {
                    makeMove(idx);
                    return;
                }
            }

            // 3. Take center
            if (emptyIndices.includes(4)) {
                makeMove(4);
                return;
            }

            // 4. Take corners
            const corners = [0, 2, 6, 8];
            const availableCorners = corners.filter(idx => emptyIndices.includes(idx));
            if (availableCorners.length > 0) {
                const randomCorner = availableCorners[Math.floor(Math.random() * availableCorners.length)];
                makeMove(randomCorner);
                return;
            }

            // 5. Take any remaining
            const randomIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
            makeMove(randomIndex);
        }

        // ---------- RESET ----------
        function resetGame() {
            if (!gameOver && board.some(cell => cell !== '')) {
                const confirmReset = confirm('Are you sure you want to reset the game?');
                if (!confirmReset) return;
            }
            initGame();
        }

        // ---------- CLICK HANDLER ----------
        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => {
                if (mode === 'single' && currentPlayer === 'o') return;
                makeMove(index);
            });
        });

        // ---------- MODE CHANGE ----------
        function setMode(newMode) {
            mode = newMode;
            singleModeBtn.classList.toggle('active', mode === 'single');
            multiModeBtn.classList.toggle('active', mode === 'multi');
            initGame();
        }

        singleModeBtn.addEventListener('click', () => setMode('single'));
        multiModeBtn.addEventListener('click', () => setMode('multi'));

        // ---------- RESET BUTTON ----------
        resetBtn.addEventListener('click', resetGame);

        // ---------- KEYBOARD SUPPORT ----------
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') resetGame();
            if (e.key === '1') setMode('single');
            if (e.key === '2') setMode('multi');
            const num = parseInt(e.key);
            if (num >= 1 && num <= 9) {
                const index = num - 1;
                if (mode === 'single' && currentPlayer === 'o') return;
                makeMove(index);
            }
        });

        // ---------- INIT ----------
        initGame();

        console.log('🎮 Tic-Tac-Toe v2.0.0 by KnoX | Good Luck <3');
        console.log('📌 Mode: Single Player (vs Bot)');
        console.log('⌨️  Keys: 1-9 for board, R=Reset, 1=Single, 2=Multi');
    </script>

</body>
</html>
