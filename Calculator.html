<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🧮 Calculator - Dillimore</title>
    <link rel="icon" type="image/png" href="https://uploadkon.ir/uploads/292a26_26calculator-icon-free-vector.jpg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
                   CSS VARIABLES
                ============================================================ */
        :root {
            --bg-body: #0f0e17;
            --bg-container: #1a1932;
            --bg-card: #222145;
            --bg-card-hover: #2a2955;
            --bg-card-border: #2a2a4a;
            --text-primary: #fffffe;
            --text-secondary: #a7a9be;
            --text-muted: #6c6e8a;
            --accent-1: #ff8906;
            --accent-2: #e53170;
            --accent-3: #6246d4;
            --accent-glow: rgba(255, 137, 6, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 16px 48px rgba(255, 137, 6, 0.06);
            --border-color: #2a2a4a;
            --radius: 18px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* ============================================================
                   RESET & BASE
                ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .container {
            background: var(--bg-container);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius);
            padding: 24px 20px 20px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
            user-select: none;
        }

        /* ============================================================
                   HEADER
                ============================================================ */
        .header {
            text-align: center;
            margin-bottom: 14px;
        }

        .header .badge {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent-1);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 2px 14px;
            border-radius: 100px;
            border: 1px solid var(--accent-glow);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .sub {
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ============================================================
                   DISPLAY
                ============================================================ */
        .display-wrap {
            background: #0d0c1a;
            border: 1px solid var(--bg-card-border);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 14px;
            min-height: 88px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            overflow: hidden;
            transition: border-color var(--transition);
        }

        .display-wrap:focus-within {
            border-color: var(--accent-1);
        }

        .display-wrap .expression {
            color: var(--text-muted);
            font-size: 13px;
            min-height: 22px;
            word-break: break-all;
            text-align: right;
            width: 100%;
            font-family: var(--font-mono);
            opacity: 0.7;
        }

        .display-wrap .result {
            color: var(--text-primary);
            font-size: 34px;
            font-weight: 700;
            min-height: 44px;
            word-break: break-all;
            text-align: right;
            width: 100%;
            font-family: var(--font-mono);
            transition: color var(--transition);
            letter-spacing: -0.5px;
        }

        .display-wrap .result.error {
            color: #ff4444;
            font-size: 22px;
        }

        /* ============================================================
                   HISTORY
                ============================================================ */
        .history-toggle {
            text-align: right;
            margin-bottom: 6px;
        }

        .history-toggle button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font);
            letter-spacing: 0.3px;
            transition: color var(--transition);
            opacity: 0.5;
        }

        .history-toggle button:hover {
            color: var(--accent-1);
            opacity: 1;
        }

        .history-box {
            background: #0d0c1a;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            padding: 0 12px;
        }

        .history-box.open {
            max-height: 150px;
            padding: 8px 12px;
            overflow-y: auto;
        }

        .history-box::-webkit-scrollbar {
            width: 3px;
        }
        .history-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-box::-webkit-scrollbar-thumb {
            background: var(--bg-card-border);
            border-radius: 4px;
        }

        .history-box .item {
            color: var(--text-muted);
            font-size: 12px;
            padding: 3px 0;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-mono);
            opacity: 0.8;
        }

        .history-box .item .h-result {
            color: var(--accent-1);
            font-weight: 600;
        }

        /* ============================================================
                   BUTTONS
                ============================================================ */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .btn {
            padding: 14px 4px;
            background: var(--bg-card);
            border: 1px solid var(--bg-card-border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font);
            text-align: center;
            touch-action: manipulation;
            user-select: none;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-1);
            color: var(--text-primary);
        }

        .btn:active {
            transform: scale(0.93);
            background: var(--bg-card-hover);
        }

        /* Special buttons */
        .btn.func {
            color: var(--accent-3);
            font-size: 12px;
        }

        .btn.func:hover {
            border-color: var(--accent-3);
            color: var(--accent-3);
        }

        .btn.op {
            color: var(--accent-1);
        }

        .btn.op:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        .btn.equals {
            background: var(--accent-1);
            color: var(--bg-body);
            font-size: 20px;
            font-weight: 800;
            border-color: var(--accent-1);
        }

        .btn.equals:hover {
            background: #e07c00;
            border-color: #e07c00;
            color: var(--bg-body);
        }

        .btn.equals:active {
            transform: scale(0.93);
        }

        .btn.clear {
            color: #ff4444;
        }

        .btn.clear:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn.span2 {
            grid-column: span 2;
        }

        /* ============================================================
                   FOOTER
                ============================================================ */
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 9px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            letter-spacing: 0.3px;
            opacity: 0.5;
        }

        .footer .brand {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }

        /* ============================================================
                   RESPONSIVE
                ============================================================ */
        @media (max-width: 440px) {
            .container {
                padding: 18px 14px 14px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .display-wrap {
                min-height: 74px;
                padding: 10px 14px;
            }

            .display-wrap .result {
                font-size: 28px;
                min-height: 36px;
            }

            .display-wrap .expression {
                font-size: 12px;
            }

            .btn {
                padding: 12px 3px;
                font-size: 13px;
                border-radius: 10px;
            }

            .btn.func {
                font-size: 10px;
            }

            .btn.equals {
                font-size: 17px;
            }

            .btn-grid {
                gap: 5px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 14px 10px 12px;
            }

            .header h1 {
                font-size: 18px;
            }

            .display-wrap .result {
                font-size: 22px;
            }

            .btn {
                padding: 10px 2px;
                font-size: 11px;
            }

            .btn.func {
                font-size: 9px;
            }

            .btn-grid {
                gap: 4px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="badge">✦ Tool</div>
        <h1>🧮 <span class="highlight">Calculator</span></h1>
        <div class="sub">Advanced scientific calculator</div>
    </div>

    <!-- DISPLAY -->
    <div class="display-wrap">
        <div class="expression" id="expressionDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
    </div>

    <!-- HISTORY -->
    <div class="history-toggle">
        <button id="historyToggle">📜 History</button>
    </div>
    <div class="history-box" id="historyBox"></div>

    <!-- BUTTONS -->
    <div class="btn-grid">
        <!-- Row 1 -->
        <button class="btn func" data-action="sin">sin</button>
        <button class="btn func" data-action="cos">cos</button>
        <button class="btn func" data-action="tan">tan</button>
        <button class="btn func" data-action="log">log</button>
        <button class="btn func" data-action="ln">ln</button>

        <!-- Row 2 -->
        <button class="btn func" data-action="sqrt">√</button>
        <button class="btn func" data-action="square">x²</button>
        <button class="btn func" data-action="cube">x³</button>
        <button class="btn func" data-action="factorial">x!</button>
        <button class="btn func" data-action="inv">1/x</button>

        <!-- Row 3 -->
        <button class="btn" data-action="7">7</button>
        <button class="btn" data-action="8">8</button>
        <button class="btn" data-action="9">9</button>
        <button class="btn op" data-action="/">÷</button>
        <button class="btn clear" data-action="clear">AC</button>

        <!-- Row 4 -->
        <button class="btn" data-action="4">4</button>
        <button class="btn" data-action="5">5</button>
        <button class="btn" data-action="6">6</button>
        <button class="btn op" data-action="*">×</button>
        <button class="btn clear" data-action="backspace">⌫</button>

        <!-- Row 5 -->
        <button class="btn" data-action="1">1</button>
        <button class="btn" data-action="2">2</button>
        <button class="btn" data-action="3">3</button>
        <button class="btn op" data-action="-">−</button>
        <button class="btn func" data-action="(">(</button>

        <!-- Row 6 -->
        <button class="btn" data-action="0">0</button>
        <button class="btn" data-action=".">.</button>
        <button class="btn func" data-action="pi">π</button>
        <button class="btn op" data-action="+">+</button>
        <button class="btn func" data-action=")">)</button>

        <!-- Row 7 -->
        <button class="btn equals span2" data-action="equals">=</button>
        <button class="btn func" data-action="percent">%</button>
        <button class="btn func" data-action="exp">EXP</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <span class="brand">Dillimore</span> — Built with ❤️ by <span class="brand">KnoX</span>
        <br>© 2024-2026 Dillimore Team. All rights reserved.
    </div>

</div>

<script>
// ================================================================
// 🧮 ADVANCED CALCULATOR  –  by KnoX  –  Version 2.0.0
// ================================================================

// ---------- DOM ----------
const resultDisplay = document.getElementById('resultDisplay');
const expressionDisplay = document.getElementById('expressionDisplay');
const historyBox = document.getElementById('historyBox');
const historyToggle = document.getElementById('historyToggle');

// ---------- STATE ----------
let currentInput = '0';
let previousInput = '';
let operation = null;
let shouldResetDisplay = false;
let history = [];
let historyOpen = false;
let lastResult = null;

// ---------- UPDATE DISPLAY ----------
function updateDisplay() {
    let display = currentInput;
    if (display.length > 15 && !display.includes('e')) {
        const num = parseFloat(display);
        if (!isNaN(num)) {
            display = num.toExponential(6);
        }
    }
    resultDisplay.textContent = display;
    resultDisplay.classList.remove('error');
}

function updateExpression(text) {
    expressionDisplay.textContent = text;
}

// ---------- HISTORY ----------
function addHistory(expr, result) {
    history.push({ expr, result });
    if (history.length > 50) history.shift();
    renderHistory();
}

function renderHistory() {
    if (history.length === 0) {
        historyBox.innerHTML = '<div class="item" style="color:var(--text-muted);opacity:0.3;">No history yet</div>';
        return;
    }
    historyBox.innerHTML = history.map(h =>
        `<div class="item">${h.expr} = <span class="h-result">${h.result}</span></div>`
    ).join('');
}

historyToggle.addEventListener('click', () => {
    historyOpen = !historyOpen;
    historyBox.classList.toggle('open', historyOpen);
    historyToggle.textContent = historyOpen ? '📜 Hide History' : '📜 History';
});

// ---------- INPUT ----------
function inputDigit(digit) {
    if (shouldResetDisplay) {
        currentInput = '0';
        shouldResetDisplay = false;
    }
    if (digit === '.' && currentInput.includes('.')) return;
    if (currentInput === '0' && digit !== '.') {
        currentInput = digit;
    } else {
        currentInput += digit;
    }
    updateDisplay();
}

// ---------- OPERATIONS ----------
function setOperation(op) {
    if (operation && !shouldResetDisplay) {
        calculate();
    }
    previousInput = currentInput;
    operation = op;
    shouldResetDisplay = true;
    updateExpression(previousInput + ' ' + getOpSymbol(op));
}

function getOpSymbol(op) {
    const map = {
        '+': '+', '-': '−', '*': '×', '/': '÷', '^': '^', '%': '%'
    };
    return map[op] || op;
}

// ---------- CALCULATE ----------
function calculate() {
    if (operation === null || shouldResetDisplay) {
        if (currentInput === 'Error') {
            currentInput = '0';
            updateDisplay();
        }
        return;
    }

    const prev = parseFloat(previousInput);
    const curr = parseFloat(currentInput);
    let result;

    if (isNaN(prev) || isNaN(curr)) {
        currentInput = 'Error';
        resultDisplay.classList.add('error');
        updateDisplay();
        return;
    }

    switch (operation) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/': 
            if (curr === 0) {
                currentInput = 'Error';
                resultDisplay.classList.add('error');
                updateDisplay();
                operation = null;
                previousInput = '';
                return;
            }
            result = prev / curr; 
            break;
        case '^': result = Math.pow(prev, curr); break;
        case '%': result = (prev / 100) * curr; break;
        default: return;
    }

    if (typeof result === 'number' && !Number.isInteger(result)) {
        result = parseFloat(result.toPrecision(12));
    }

    const expr = previousInput + ' ' + getOpSymbol(operation) + ' ' + currentInput;
    currentInput = String(result);
    lastResult = result;
    updateDisplay();
    updateExpression(expr + ' =');
    addHistory(expr, currentInput);

    operation = null;
    previousInput = '';
    shouldResetDisplay = true;
}

// ---------- UNARY FUNCTIONS ----------
function unaryFunction(func) {
    const num = parseFloat(currentInput);
    if (isNaN(num)) {
        currentInput = 'Error';
        resultDisplay.classList.add('error');
        updateDisplay();
        return;
    }

    let result;
    let displayName = func;
    switch (func) {
        case 'sin': result = Math.sin(num * Math.PI / 180); displayName = 'sin(' + currentInput + ')'; break;
        case 'cos': result = Math.cos(num * Math.PI / 180); displayName = 'cos(' + currentInput + ')'; break;
        case 'tan': result = Math.tan(num * Math.PI / 180); displayName = 'tan(' + currentInput + ')'; break;
        case 'log': 
            if (num <= 0) { currentInput = 'Error'; resultDisplay.classList.add('error'); updateDisplay(); return; }
            result = Math.log10(num); displayName = 'log(' + currentInput + ')'; break;
        case 'ln': 
            if (num <= 0) { currentInput = 'Error'; resultDisplay.classList.add('error'); updateDisplay(); return; }
            result = Math.log(num); displayName = 'ln(' + currentInput + ')'; break;
        case 'sqrt': 
            if (num < 0) { currentInput = 'Error'; resultDisplay.classList.add('error'); updateDisplay(); return; }
            result = Math.sqrt(num); displayName = '√(' + currentInput + ')'; break;
        case 'square': result = num * num; displayName = '(' + currentInput + ')²'; break;
        case 'cube': result = num * num * num; displayName = '(' + currentInput + ')³'; break;
        case 'factorial':
            if (num < 0 || !Number.isInteger(num)) { currentInput = 'Error'; resultDisplay.classList.add('error'); updateDisplay(); return; }
            let f = 1;
            for (let i = 2; i <= num; i++) f *= i;
            result = f; displayName = currentInput + '!'; break;
        case 'inv':
            if (num === 0) { currentInput = 'Error'; resultDisplay.classList.add('error'); updateDisplay(); return; }
            result = 1 / num; displayName = '1/(' + currentInput + ')'; break;
        case 'exp': result = Math.exp(num); displayName = 'e^(' + currentInput + ')'; break;
        case 'percent': result = num / 100; displayName = currentInput + '%'; break;
        default: return;
    }

    if (typeof result === 'number' && !Number.isInteger(result)) {
        result = parseFloat(result.toPrecision(12));
    }

    currentInput = String(result);
    updateDisplay();
    updateExpression(displayName + ' =');
    addHistory(displayName, currentInput);
    shouldResetDisplay = true;
    lastResult = result;
}

// ---------- PI ----------
function inputPi() {
    if (shouldResetDisplay) {
        currentInput = '0';
        shouldResetDisplay = false;
    }
    if (currentInput === '0') {
        currentInput = String(Math.PI);
    } else {
        currentInput += '*π';
        const parts = currentInput.split('π');
        if (parts.length > 1) {
            currentInput = parts.join('*' + Math.PI);
            currentInput = currentInput.replace(/^\*/g, '');
            currentInput = currentInput.replace(/\*{2,}/g, '*');
        }
    }
    updateDisplay();
}

// ---------- BACKSPACE ----------
function backspace() {
    if (shouldResetDisplay) return;
    if (currentInput.length <= 1) {
        currentInput = '0';
    } else {
        currentInput = currentInput.slice(0, -1);
    }
    updateDisplay();
}

// ---------- CLEAR ----------
function clearAll() {
    currentInput = '0';
    previousInput = '';
    operation = null;
    shouldResetDisplay = false;
    updateDisplay();
    updateExpression('');
    resultDisplay.classList.remove('error');
}

// ---------- HANDLE BUTTONS ----------
document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
        const action = this.dataset.action;

        if (currentInput === 'Error') {
            if (action !== 'clear') {
                currentInput = '0';
                updateDisplay();
                resultDisplay.classList.remove('error');
            }
        }

        switch (action) {
            case '0': case '1': case '2': case '3': case '4':
            case '5': case '6': case '7': case '8': case '9':
                inputDigit(action); break;
            case '.': inputDigit('.'); break;
            case 'pi': inputPi(); break;

            case '+': case '-': case '*': case '/':
                setOperation(action); break;
            case '^': setOperation('^'); break;
            case 'percent': unaryFunction('percent'); break;
            case 'exp': unaryFunction('exp'); break;

            case 'equals': 
                if (operation) {
                    calculate();
                } else if (lastResult !== null) {
                    const prev = parseFloat(previousInput);
                    const curr = parseFloat(currentInput);
                    if (!isNaN(prev) && !isNaN(curr) && operation) {
                        calculate();
                    }
                }
                break;

            case 'sin': case 'cos': case 'tan': case 'log': case 'ln':
            case 'sqrt': case 'square': case 'cube': case 'factorial': case 'inv':
                unaryFunction(action); break;

            case 'clear': clearAll(); break;
            case 'backspace': backspace(); break;
            case '(':
                if (shouldResetDisplay) {
                    currentInput = '0';
                    shouldResetDisplay = false;
                }
                currentInput += '(';
                updateDisplay(); break;
            case ')':
                currentInput += ')';
                updateDisplay(); break;

            default: break;
        }
    });

    btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        this.click();
    }, { passive: false });
});

// ---------- KEYBOARD SUPPORT ----------
document.addEventListener('keydown', function(e) {
    const key = e.key;

    if (key >= '0' && key <= '9') {
        e.preventDefault();
        document.querySelector(`[data-action="${key}"]`)?.click();
        return;
    }

    switch (key) {
        case '.': document.querySelector('[data-action="."]')?.click(); e.preventDefault(); break;
        case '+': document.querySelector('[data-action="+"]')?.click(); e.preventDefault(); break;
        case '-': document.querySelector('[data-action="-"]')?.click(); e.preventDefault(); break;
        case '*': document.querySelector('[data-action="*"]')?.click(); e.preventDefault(); break;
        case '/': document.querySelector('[data-action="/"]')?.click(); e.preventDefault(); break;
        case 'Enter': case '=': document.querySelector('[data-action="equals"]')?.click(); e.preventDefault(); break;
        case 'Backspace': document.querySelector('[data-action="backspace"]')?.click(); e.preventDefault(); break;
        case 'Escape': document.querySelector('[data-action="clear"]')?.click(); e.preventDefault(); break;
        case '(': document.querySelector('[data-action="("]')?.click(); e.preventDefault(); break;
        case ')': document.querySelector('[data-action=")"]')?.click(); e.preventDefault(); break;
        default: break;
    }
});

// ---------- INIT ----------
clearAll();
renderHistory();

console.log('🧮 Advanced Calculator v2.0.0 by KnoX | Good Luck <3');
</script>
</body>
</html>
