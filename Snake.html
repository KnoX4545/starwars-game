<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Snake Game - Dillimore</title>
    <link rel="icon" type="image/png" href="https://uploadkon.ir/uploads/a1d927_26Dillimore-Snake.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
                   CSS VARIABLES
                ============================================================ */
        :root {
            --bg-body: #0f0e17;
            --bg-container: #1a1932;
            --bg-card: #222145;
            --bg-card-border: #2a2a4a;
            --text-primary: #fffffe;
            --text-secondary: #a7a9be;
            --text-muted: #6c6e8a;
            --accent-1: #ff8906;
            --accent-2: #e53170;
            --accent-3: #6246d4;
            --accent-glow: rgba(255, 137, 6, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 16px 48px rgba(255, 137, 6, 0.06);
            --border-color: #2a2a4a;
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ============================================================
                   RESET & BASE
                ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .container {
            background: var(--bg-container);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius);
            padding: 28px 24px 24px;
            max-width: 560px;
            width: 100%;
            box-shadow: var(--shadow);
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============================================================
                   HEADER
                ============================================================ */
        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header .badge {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent-1);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 2px 14px;
            border-radius: 100px;
            border: 1px solid var(--accent-glow);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .sub {
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ============================================================
                   SCORE BAR
                ============================================================ */
        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 12px 4px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .score-bar .item {
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 0.3px;
            font-weight: 500;
        }

        .score-bar .item .num {
            color: var(--accent-1);
            font-weight: 700;
            font-size: 18px;
            margin-left: 4px;
        }

        .score-bar .item .num.high {
            color: var(--accent-2);
        }

        .btn-restart-top {
            padding: 6px 18px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font);
            letter-spacing: 0.3px;
        }

        .btn-restart-top:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        .btn-restart-top:active {
            transform: scale(0.95);
        }

        /* ============================================================
                   CANVAS
                ============================================================ */
        .canvas-wrap {
            position: relative;
            background: #0d0c1a;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0d0c1a;
            image-rendering: pixelated;
            touch-action: none;
        }

        /* ============================================================
                   GAME OVER OVERLAY
                ============================================================ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 14, 23, 0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(6px);
        }

        .overlay.show {
            display: flex;
        }

        .overlay .gameover-title {
            color: var(--accent-2);
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .overlay .final-score {
            color: var(--text-secondary);
            font-size: 15px;
            margin-top: 8px;
        }

        .overlay .final-score .num {
            color: var(--accent-1);
            font-weight: 700;
            font-size: 20px;
        }

        .overlay .final-score .num.high {
            color: var(--accent-2);
        }

        .overlay .btn-restart-overlay {
            margin-top: 20px;
            padding: 10px 36px;
            background: transparent;
            border: 2px solid var(--accent-1);
            color: var(--accent-1);
            font-size: 15px;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.5px;
            font-family: var(--font);
        }

        .overlay .btn-restart-overlay:hover {
            background: var(--accent-1);
            color: var(--bg-body);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .overlay .btn-restart-overlay:active {
            transform: scale(0.95);
        }

        /* ============================================================
                   D-PAD
                ============================================================ */
        .dpad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 6px;
            justify-content: center;
            margin: 16px auto 0;
            width: fit-content;
            touch-action: none;
        }

        .dpad-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-muted);
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        .dpad-btn:active {
            transform: scale(0.88);
            background: var(--bg-card-hover);
            border-color: var(--accent-1);
            color: var(--accent-1);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .dpad-btn.up { grid-column: 2; grid-row: 1; }
        .dpad-btn.left { grid-column: 1; grid-row: 2; }
        .dpad-btn.center { 
            grid-column: 2; grid-row: 2;
            background: transparent;
            border-color: transparent;
            font-size: 10px;
            color: var(--text-muted);
            cursor: default;
            border-radius: 50%;
            opacity: 0.3;
        }
        .dpad-btn.right { grid-column: 3; grid-row: 2; }
        .dpad-btn.down { grid-column: 2; grid-row: 3; }

        /* ============================================================
                   FOOTER
                ============================================================ */
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
            letter-spacing: 0.3px;
            opacity: 0.6;
        }

        .footer .brand {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }

        .footer .copyright {
            font-size: 9px;
            opacity: 0.5;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        /* ============================================================
                   RESPONSIVE
                ============================================================ */
        @media (max-width: 560px) {
            .container {
                max-width: 100%;
                padding: 20px 16px 16px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 24px;
            }

            .dpad {
                grid-template-columns: 52px 52px 52px;
                grid-template-rows: 52px 52px 52px;
                gap: 5px;
            }

            .dpad-btn {
                font-size: 18px;
                border-radius: 12px;
            }

            .score-bar .item {
                font-size: 12px;
            }

            .score-bar .item .num {
                font-size: 16px;
            }

            .btn-restart-top {
                font-size: 11px;
                padding: 4px 14px;
            }

            .overlay .gameover-title {
                font-size: 24px;
            }

            .overlay .btn-restart-overlay {
                padding: 8px 28px;
                font-size: 13px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 14px 12px 12px;
            }

            .header h1 {
                font-size: 20px;
            }

            .dpad {
                grid-template-columns: 44px 44px 44px;
                grid-template-rows: 44px 44px 44px;
                gap: 4px;
            }

            .dpad-btn {
                font-size: 15px;
                border-radius: 10px;
            }

            .score-bar .item {
                font-size: 10px;
            }

            .score-bar .item .num {
                font-size: 14px;
            }

            .btn-restart-top {
                font-size: 9px;
                padding: 3px 10px;
            }
        }

        @media (max-width: 350px) {
            .dpad {
                grid-template-columns: 38px 38px 38px;
                grid-template-rows: 38px 38px 38px;
                gap: 3px;
            }

            .dpad-btn {
                font-size: 13px;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="badge">✦ Classic</div>
        <h1>🐍 <span class="highlight">Snake</span></h1>
        <div class="sub">Eat, grow, survive</div>
    </div>

    <!-- SCORE BAR -->
    <div class="score-bar">
        <span class="item">🍎 <span class="num" id="scoreDisplay">0</span></span>
        <span class="item">🏆 <span class="num high" id="highScoreDisplay">0</span></span>
        <button class="btn-restart-top" id="restartTopBtn">↻ Restart</button>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="overlay" id="gameOverOverlay">
            <div class="gameover-title">💀 GAME OVER</div>
            <div class="final-score">Score: <span class="num" id="finalScore">0</span></div>
            <div class="final-score">Best: <span class="num high" id="finalHighScore">0</span></div>
            <button class="btn-restart-overlay" id="restartOverlayBtn">↻ Play Again</button>
        </div>
    </div>

    <!-- D-PAD -->
    <div class="dpad" id="dpad">
        <button class="dpad-btn up"    data-dir="up">▲</button>
        <button class="dpad-btn left"  data-dir="left">◀</button>
        <button class="dpad-btn center">●</button>
        <button class="dpad-btn right" data-dir="right">▶</button>
        <button class="dpad-btn down"  data-dir="down">▼</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div>
            <span class="brand">Dillimore</span> — Built with ❤️ by <span class="brand">KnoX</span>
        </div>
        <div class="copyright">
            © 2024-2026 Dillimore Team. All rights reserved.
        </div>
    </div>

</div>

<script>
// ================================================================
// 🐍 SNAKE GAME  –  by KnoX  –  Version 2.1.0
// ================================================================

// ---------- DOM ----------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const highScoreDisplay = document.getElementById('highScoreDisplay');
const finalScore = document.getElementById('finalScore');
const finalHighScore = document.getElementById('finalHighScore');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const restartTopBtn = document.getElementById('restartTopBtn');
const restartOverlayBtn = document.getElementById('restartOverlayBtn');

// ---------- SETTINGS ----------
const BOARD_SIZE = 20;
const CELL_SIZE = canvas.width / BOARD_SIZE;
const TICK_INTERVAL = 167;

// ---------- STATE ----------
let snake = [];
let direction = { dx: 1, dy: 0 };
let nextDirection = { dx: 1, dy: 0 };
let food = { x: 8, y: 10 };
let score = 0;
let highScore = 0;
let gameRunning = false;
let gameLoop = null;
let inputQueue = [];

// ---------- HIGH SCORE ----------
function loadHighScore() {
    try {
        const saved = localStorage.getItem('snake_highscore');
        if (saved) highScore = parseInt(saved, 10) || 0;
    } catch (e) { /* ignore */ }
    highScoreDisplay.textContent = highScore;
}
function saveHighScore() {
    try {
        localStorage.setItem('snake_highscore', String(highScore));
    } catch (e) { /* ignore */ }
}

// ---------- INIT ----------
function initGame() {
    snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ];
    direction = { dx: 1, dy: 0 };
    nextDirection = { dx: 1, dy: 0 };
    inputQueue = [];
    score = 0;
    scoreDisplay.textContent = '0';
    gameRunning = true;
    gameOverOverlay.classList.remove('show');
    document.querySelector('.gameover-title').textContent = '💀 GAME OVER';
    spawnFood();
    draw();
}

// ---------- FOOD ----------
function spawnFood() {
    const maxAttempts = 1000;
    for (let i = 0; i < maxAttempts; i++) {
        const fx = Math.floor(Math.random() * BOARD_SIZE);
        const fy = Math.floor(Math.random() * BOARD_SIZE);
        if (!snake.some(cell => cell.x === fx && cell.y === fy)) {
            food = { x: fx, y: fy };
            return;
        }
    }
    for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE; x++) {
            if (!snake.some(cell => cell.x === x && cell.y === y)) {
                food = { x, y };
                return;
            }
        }
    }
    gameWin();
}

// ---------- DRAW ----------
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(42, 42, 74, 0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= BOARD_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
    }

    // Food
    ctx.shadowColor = '#e53170';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#e53170';
    ctx.beginPath();
    ctx.arc(
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        CELL_SIZE / 2 - 2,
        0,
        Math.PI * 2
    );
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake
    const len = snake.length;
    snake.forEach((cell, index) => {
        const isHead = index === 0;
        const x = cell.x * CELL_SIZE;
        const y = cell.y * CELL_SIZE;
        const padding = isHead ? 1 : 2;
        const radius = 4;

        const intensity = 0.4 + (0.6 * (1 - index / len));
        const orange = Math.round(255 * intensity * 0.4 + 137 * (1 - intensity * 0.4));
        const green = Math.round(255 * intensity * 0.3 + 6 * (1 - intensity * 0.3));
        ctx.fillStyle = isHead ? '#ff8906' : `rgb(${orange}, ${green}, 40)`;

        const cx = x + padding;
        const cy = y + padding;
        const w = CELL_SIZE - padding * 2;
        const h = CELL_SIZE - padding * 2;
        ctx.beginPath();
        ctx.moveTo(cx + radius, cy);
        ctx.lineTo(cx + w - radius, cy);
        ctx.quadraticCurveTo(cx + w, cy, cx + w, cy + radius);
        ctx.lineTo(cx + w, cy + h - radius);
        ctx.quadraticCurveTo(cx + w, cy + h, cx + w - radius, cy + h);
        ctx.lineTo(cx + radius, cy + h);
        ctx.quadraticCurveTo(cx, cy + h, cx, cy + h - radius);
        ctx.lineTo(cx, cy + radius);
        ctx.quadraticCurveTo(cx, cy, cx + radius, cy);
        ctx.closePath();
        ctx.fill();

        if (isHead) {
            ctx.shadowColor = '#ff8906';
            ctx.shadowBlur = 24;
            ctx.fillStyle = 'rgba(255, 137, 6, 0.06)';
            ctx.beginPath();
            ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    });

    // Eyes
    const head = snake[0];
    if (head) {
        const hx = head.x * CELL_SIZE + CELL_SIZE / 2;
        const hy = head.y * CELL_SIZE + CELL_SIZE / 2;
        const eyeOff = 5;
        const eyeSize = 3;
        ctx.fillStyle = '#0f0e17';
        if (direction.dx === 1) {
            ctx.fillRect(hx + 4, hy - eyeOff, eyeSize, eyeSize);
            ctx.fillRect(hx + 4, hy + eyeOff - eyeSize, eyeSize, eyeSize);
        } else if (direction.dx === -1) {
            ctx.fillRect(hx - 4 - eyeSize, hy - eyeOff, eyeSize, eyeSize);
            ctx.fillRect(hx - 4 - eyeSize, hy + eyeOff - eyeSize, eyeSize, eyeSize);
        } else if (direction.dy === -1) {
            ctx.fillRect(hx - eyeOff, hy - 4 - eyeSize, eyeSize, eyeSize);
            ctx.fillRect(hx + eyeOff - eyeSize, hy - 4 - eyeSize, eyeSize, eyeSize);
        } else {
            ctx.fillRect(hx - eyeOff, hy + 4, eyeSize, eyeSize);
            ctx.fillRect(hx + eyeOff - eyeSize, hy + 4, eyeSize, eyeSize);
        }
    }
}

// ---------- UPDATE ----------
function update() {
    if (!gameRunning) return;

    while (inputQueue.length > 0) {
        const dir = inputQueue.shift();
        if (direction.dx !== -dir.dx || direction.dy !== -dir.dy) {
            nextDirection = dir;
            break;
        }
    }

    direction = { ...nextDirection };

    const head = snake[0];
    let newHead = {
        x: head.x + direction.dx,
        y: head.y + direction.dy
    };

    if (newHead.x < 0) newHead.x = BOARD_SIZE - 1;
    if (newHead.x >= BOARD_SIZE) newHead.x = 0;
    if (newHead.y < 0) newHead.y = BOARD_SIZE - 1;
    if (newHead.y >= BOARD_SIZE) newHead.y = 0;

    const isEating = (newHead.x === food.x && newHead.y === food.y);

    const tailIndex = isEating ? snake.length : snake.length - 1;
    for (let i = 0; i < tailIndex; i++) {
        if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
            gameOver();
            return;
        }
    }

    if (isEating) {
        snake = [newHead, ...snake];
        score++;
        scoreDisplay.textContent = score;
        spawnFood();
        if (snake.length === BOARD_SIZE * BOARD_SIZE) {
            gameWin();
            return;
        }
    } else {
        snake = [newHead, ...snake.slice(0, -1)];
    }

    draw();
}

// ---------- GAME OVER ----------
function gameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
    }
    if (score > highScore) {
        highScore = score;
        saveHighScore();
        highScoreDisplay.textContent = highScore;
    }
    finalScore.textContent = score;
    finalHighScore.textContent = highScore;
    gameOverOverlay.classList.add('show');
}

// ---------- GAME WIN ----------
function gameWin() {
    gameRunning = false;
    if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
    }
    if (score > highScore) {
        highScore = score;
        saveHighScore();
        highScoreDisplay.textContent = highScore;
    }
    finalScore.textContent = score + ' 🏆';
    finalHighScore.textContent = highScore;
    document.querySelector('.gameover-title').textContent = '🎉 YOU WIN!';
    gameOverOverlay.classList.add('show');
}

// ---------- RESTART ----------
function restartGame() {
    if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
    }
    document.querySelector('.gameover-title').textContent = '💀 GAME OVER';
    initGame();
    gameLoop = setInterval(update, TICK_INTERVAL);
}

// ---------- DIRECTION ----------
function setDirection(dx, dy) {
    if (!gameRunning) return;
    if (inputQueue.length > 0) {
        const last = inputQueue[inputQueue.length - 1];
        if (last.dx === dx && last.dy === dy) return;
    }
    inputQueue.push({ dx, dy });
    if (inputQueue.length > 3) inputQueue.shift();
}

// ---------- KEYBOARD ----------
function handleKey(e) {
    const key = e.key;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
        e.preventDefault();
    }

    if (key === ' ' || key === 'Space') {
        if (!gameRunning) restartGame();
        return;
    }
    if (!gameRunning) return;

    switch (key) {
        case 'ArrowUp':    setDirection(0, -1); break;
        case 'ArrowDown':  setDirection(0, 1); break;
        case 'ArrowLeft':  setDirection(-1, 0); break;
        case 'ArrowRight': setDirection(1, 0); break;
    }
}

// ---------- DPAD ----------
document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
    const dirMap = {
        'up': { dx: 0, dy: -1 },
        'down': { dx: 0, dy: 1 },
        'left': { dx: -1, dy: 0 },
        'right': { dx: 1, dy: 0 }
    };
    const dir = btn.dataset.dir;

    btn.addEventListener('click', function(e) {
        e.preventDefault();
        const d = dirMap[dir];
        if (d) setDirection(d.dx, d.dy);
    });

    btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const d = dirMap[dir];
        if (d) setDirection(d.dx, d.dy);
    }, { passive: false });
});

// ---------- RESTART ----------
