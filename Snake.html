<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐍 Snake Game</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            touch-action: none;
        }
        .container {
            background: #111;
            border: 2px solid #00ff41;
            border-radius: 20px;
            padding: 20px 16px 16px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.04);
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        .header h1 {
            color: #00ff41;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
        }
        .header .sub {
            color: #666;
            font-size: 10px;
            letter-spacing: 1.5px;
            margin-top: 2px;
        }
        .header .sub span {
            color: #00ff41;
        }

        /* ===== SCORE BAR ===== */
        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 2px 10px 2px;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 12px;
        }
        .score-bar .item {
            color: #555;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        .score-bar .item .num {
            color: #00ff41;
            font-weight: 700;
            font-size: 16px;
            margin-left: 3px;
        }
        .score-bar .item .num.high {
            color: #ffd700;
        }
        .btn-restart-top {
            padding: 4px 14px;
            background: transparent;
            border: 1px solid #333;
            color: #888;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
            touch-action: manipulation;
        }
        .btn-restart-top:active {
            transform: scale(0.92);
            border-color: #00ff41;
            color: #00ff41;
        }

        /* ===== CANVAS ===== */
        .canvas-wrap {
            position: relative;
            background: #0d0d0d;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0d0d0d;
            image-rendering: pixelated;
            touch-action: none;
        }

        /* ===== GAME OVER OVERLAY ===== */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.88);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(3px);
        }
        .overlay.show {
            display: flex;
        }
        .overlay .gameover-title {
            color: #ff4444;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 3px;
        }
        .overlay .final-score {
            color: #aaa;
            font-size: 14px;
            margin-top: 6px;
        }
        .overlay .final-score .num {
            color: #00ff41;
            font-weight: 700;
            font-size: 18px;
        }
        .overlay .final-score .num.high {
            color: #ffd700;
        }
        .overlay .btn-restart-overlay {
            margin-top: 16px;
            padding: 8px 32px;
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1.5px;
            font-family: inherit;
            touch-action: manipulation;
        }
        .overlay .btn-restart-overlay:active {
            transform: scale(0.92);
            background: #00ff41;
            color: #0a0a0a;
        }

        /* ===== D-PAD ===== */
        .dpad {
            display: grid;
            grid-template-columns: 56px 56px 56px;
            grid-template-rows: 56px 56px 56px;
            gap: 5px;
            justify-content: center;
            margin: 14px auto 0;
            width: fit-content;
            touch-action: none;
        }
        .dpad-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #888;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.08s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        .dpad-btn:active {
            transform: scale(0.88);
            background: #2a2a2a;
            border-color: #00ff41;
            color: #00ff41;
        }
        .dpad-btn.up { grid-column: 2; grid-row: 1; }
        .dpad-btn.left { grid-column: 1; grid-row: 2; }
        .dpad-btn.center { 
            grid-column: 2; grid-row: 2; 
            background: #0d0d0d;
            border-color: #1a1a1a;
            font-size: 10px;
            color: #333;
            cursor: default;
            border-radius: 50%;
        }
        .dpad-btn.right { grid-column: 3; grid-row: 2; }
        .dpad-btn.down { grid-column: 2; grid-row: 3; }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            color: #222;
            font-size: 9px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #111;
            letter-spacing: 0.5px;
        }
        .footer span {
            color: #00ff41;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container { padding: 14px 10px 12px; }
            .header h1 { font-size: 18px; }
            .score-bar .item { font-size: 10px; }
            .score-bar .item .num { font-size: 14px; }
            .btn-restart-top { font-size: 9px; padding: 3px 12px; }
            .overlay .gameover-title { font-size: 20px; }
            .overlay .btn-restart-overlay { padding: 6px 20px; font-size: 12px; }
            .dpad {
                grid-template-columns: 48px 48px 48px;
                grid-template-rows: 48px 48px 48px;
                gap: 4px;
            }
            .dpad-btn { font-size: 18px; border-radius: 10px; }
            .dpad-btn.center { font-size: 8px; }
        }
        @media (max-width: 380px) {
            .dpad {
                grid-template-columns: 42px 42px 42px;
                grid-template-rows: 42px 42px 42px;
                gap: 3px;
            }
            .dpad-btn { font-size: 15px; border-radius: 8px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>🐍 SNAKE</h1>
        <div class="sub">by <span>KnoX</span>  |  Good Luck &lt;3</div>
    </div>

    <!-- SCORE BAR -->
    <div class="score-bar">
        <span class="item">🍎 <span class="num" id="scoreDisplay">0</span></span>
        <span class="item">🏆 <span class="num high" id="highScoreDisplay">0</span></span>
        <button class="btn-restart-top" id="restartTopBtn">↻ Restart</button>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="overlay" id="gameOverOverlay">
            <div class="gameover-title">💀 GAME OVER</div>
            <div class="final-score">Score: <span class="num" id="finalScore">0</span></div>
            <div class="final-score">Best: <span class="num high" id="finalHighScore">0</span></div>
            <button class="btn-restart-overlay" id="restartOverlayBtn">↻ Play Again</button>
        </div>
    </div>

    <!-- D-PAD -->
    <div class="dpad" id="dpad">
        <button class="dpad-btn up"    data-dir="up">▲</button>
        <button class="dpad-btn left"  data-dir="left">◀</button>
        <button class="dpad-btn center">●</button>
        <button class="dpad-btn right" data-dir="right">▶</button>
        <button class="dpad-btn down"  data-dir="down">▼</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <span>#Dillimore Projects by KnoX</span>  |  Good Luck &lt;3
    </div>

</div>

<script>
// ================================================================
// 🐍 SNAKE GAME  –  by KnoX  –  Version 1.2.0 (Wrap-Around)
// ================================================================

// ---------- DOM ----------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const highScoreDisplay = document.getElementById('highScoreDisplay');
const finalScore = document.getElementById('finalScore');
const finalHighScore = document.getElementById('finalHighScore');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const restartTopBtn = document.getElementById('restartTopBtn');
const restartOverlayBtn = document.getElementById('restartOverlayBtn');

// ---------- SETTINGS ----------
const BOARD_SIZE = 20;
const CELL_SIZE = canvas.width / BOARD_SIZE;
const TICK_INTERVAL = 167;

// ---------- STATE ----------
let snake = [];
let direction = { dx: 1, dy: 0 };
let nextDirection = { dx: 1, dy: 0 };
let food = { x: 8, y: 10 };
let score = 0;
let highScore = 0;
let gameRunning = false;
let gameLoop = null;
let inputQueue = [];

// ---------- HIGH SCORE ----------
function loadHighScore() {
    try {
        const saved = localStorage.getItem('snake_highscore');
        if (saved) highScore = parseInt(saved, 10) || 0;
    } catch (e) { /* ignore */ }
    highScoreDisplay.textContent = highScore;
}
function saveHighScore() {
    try {
        localStorage.setItem('snake_highscore', String(highScore));
    } catch (e) { /* ignore */ }
}

// ---------- INIT ----------
function initGame() {
    snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ];
    direction = { dx: 1, dy: 0 };
    nextDirection = { dx: 1, dy: 0 };
    inputQueue = [];
    score = 0;
    scoreDisplay.textContent = '0';
    gameRunning = true;
    gameOverOverlay.classList.remove('show');
    document.querySelector('.gameover-title').textContent = '💀 GAME OVER';
    spawnFood();
    draw();
}

// ---------- FOOD ----------
function spawnFood() {
    const maxAttempts = 1000;
    for (let i = 0; i < maxAttempts; i++) {
        const fx = Math.floor(Math.random() * BOARD_SIZE);
        const fy = Math.floor(Math.random() * BOARD_SIZE);
        if (!snake.some(cell => cell.x === fx && cell.y === fy)) {
            food = { x: fx, y: fy };
            return;
        }
    }
    for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE; x++) {
            if (!snake.some(cell => cell.x === x && cell.y === y)) {
                food = { x, y };
                return;
            }
        }
    }
    gameWin();
}

// ---------- DRAW ----------
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = '#141414';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= BOARD_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
    }

    // Food
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        CELL_SIZE / 2 - 2,
        0,
        Math.PI * 2
    );
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake
    const len = snake.length;
    snake.forEach((cell, index) => {
        const isHead = index === 0;
        const x = cell.x * CELL_SIZE;
        const y = cell.y * CELL_SIZE;
        const padding = isHead ? 1 : 2;
        const radius = 4;

        const intensity = 0.4 + (0.6 * (1 - index / len));
        const green = Math.round(200 * intensity);
        ctx.fillStyle = isHead ? '#00ff41' : `rgb(0, ${green}, 60)`;

        const cx = x + padding;
        const cy = y + padding;
        const w = CELL_SIZE - padding * 2;
        const h = CELL_SIZE - padding * 2;
        ctx.beginPath();
        ctx.moveTo(cx + radius, cy);
        ctx.lineTo(cx + w - radius, cy);
        ctx.quadraticCurveTo(cx + w, cy, cx + w, cy + radius);
        ctx.lineTo(cx + w, cy + h - radius);
        ctx.quadraticCurveTo(cx + w, cy + h, cx + w - radius, cy + h);
        ctx.lineTo(cx + radius, cy + h);
        ctx.quadraticCurveTo(cx, cy + h, cx, cy + h - radius);
        ctx.lineTo(cx, cy + radius);
        ctx.quadraticCurveTo(cx, cy, cx + radius, cy);
        ctx.closePath();
        ctx.fill();

        if (isHead) {
            ctx.shadowColor = '#00ff41';
            ctx.shadowBlur = 18;
            ctx.fillStyle = 'rgba(0,255,65,0.08)';
            ctx.beginPath();
            ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    });

    // Eyes
    const head = snake[0];
    if (head) {
        const hx = head.x * CELL_SIZE + CELL_SIZE / 2;
        const hy = head.y * CELL_SIZE + CELL_SIZE / 2;
        const eyeOff = 5;
        const eyeSize = 3;
        ctx.fillStyle = '#0a0a0a';
        if (direction.dx === 1) {
            ctx.fillRect(hx + 4, hy - eyeOff, eyeSize, eyeSize);
            ctx.fillRect(hx + 4, hy + eyeOff - eyeSize, eyeSize, eyeSize);
        } else if (direction.dx === -1) {
            ctx.fillRect(hx - 4 - eyeSize, hy - eyeOff, eyeSize, eyeSize);
            ctx.fillRect(hx - 4 - eyeSize, hy + eyeOff - eyeSize, eyeSize, eyeSize);
        } else if (direction.dy === -1) {
            ctx.fillRect(hx - eyeOff, hy - 4 - eyeSize, eyeSize, eyeSize);
            ctx.fillRect(hx + eyeOff - eyeSize, hy - 4 - eyeSize, eyeSize, eyeSize);
        } else {
            ctx.fillRect(hx - eyeOff, hy + 4, eyeSize, eyeSize);
            ctx.fillRect(hx + eyeOff - eyeSize, hy + 4, eyeSize, eyeSize);
        }
    }
}

// ---------- UPDATE (with Wrap-Around) ----------
function update() {
    if (!gameRunning) return;

    // Process queued input
    while (inputQueue.length > 0) {
        const dir = inputQueue.shift();
        if (direction.dx !== -dir.dx || direction.dy !== -dir.dy) {
            nextDirection = dir;
            break;
        }
    }

    direction = { ...nextDirection };

    const head = snake[0];
    let newHead = {
        x: head.x + direction.dx,
        y: head.y + direction.dy
    };

    // ===== WRAP-AROUND =====
    if (newHead.x < 0) newHead.x = BOARD_SIZE - 1;
    if (newHead.x >= BOARD_SIZE) newHead.x = 0;
    if (newHead.y < 0) newHead.y = BOARD_SIZE - 1;
    if (newHead.y >= BOARD_SIZE) newHead.y = 0;

    const isEating = (newHead.x === food.x && newHead.y === food.y);

    // Self collision (except tail if eating)
    const tailIndex = isEating ? snake.length : snake.length - 1;
    for (let i = 0; i < tailIndex; i++) {
        if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
            gameOver();
            return;
        }
    }

    if (isEating) {
        snake = [newHead, ...snake];
        score++;
        scoreDisplay.textContent = score;
        spawnFood();
        if (snake.length === BOARD_SIZE * BOARD_SIZE) {
            gameWin();
            return;
        }
    } else {
        snake = [newHead, ...snake.slice(0, -1)];
    }

    draw();
}

// ---------- GAME OVER ----------
function gameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
    }
    if (score > highScore) {
        highScore = score;
        saveHighScore();
        highScoreDisplay.textContent = highScore;
    }
    finalScore.textContent = score;
    finalHighScore.textContent = highScore;
    gameOverOverlay.classList.add('show');
}

// ---------- GAME WIN ----------
function gameWin() {
    gameRunning = false;
    if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
    }
    if (score > highScore) {
        highScore = score;
        saveHighScore();
        highScoreDisplay.textContent = highScore;
    }
    finalScore.textContent = score + ' 🏆';
    finalHighScore.textContent = highScore;
    document.querySelector('.gameover-title').textContent = '🎉 YOU WIN!';
    gameOverOverlay.classList.add('show');
}

// ---------- RESTART ----------
function restartGame() {
    if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
    }
    document.querySelector('.gameover-title').textContent = '💀 GAME OVER';
    initGame();
    gameLoop = setInterval(update, TICK_INTERVAL);
}

// ---------- DIRECTION ----------
function setDirection(dx, dy) {
    if (!gameRunning) return;
    if (inputQueue.length > 0) {
        const last = inputQueue[inputQueue.length - 1];
        if (last.dx === dx && last.dy === dy) return;
    }
    inputQueue.push({ dx, dy });
    if (inputQueue.length > 3) inputQueue.shift();
}

// ---------- KEYBOARD ----------
function handleKey(e) {
    const key = e.key;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
        e.preventDefault();
    }

    if (key === ' ' || key === 'Space') {
        if (!gameRunning) restartGame();
        return;
    }
    if (!gameRunning) return;

    switch (key) {
        case 'ArrowUp':    setDirection(0, -1); break;
        case 'ArrowDown':  setDirection(0, 1); break;
        case 'ArrowLeft':  setDirection(-1, 0); break;
        case 'ArrowRight': setDirection(1, 0); break;
    }
}

// ---------- DPAD ----------
document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
    const dirMap = {
        'up': { dx: 0, dy: -1 },
        'down': { dx: 0, dy: 1 },
        'left': { dx: -1, dy: 0 },
        'right': { dx: 1, dy: 0 }
    };
    const dir = btn.dataset.dir;

    btn.addEventListener('click', function(e) {
        e.preventDefault();
        const d = dirMap[dir];
        if (d) setDirection(d.dx, d.dy);
    });

    btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const d = dirMap[dir];
        if (d) setDirection(d.dx, d.dy);
    }, { passive: false });

    btn.addEventListener('mousedown', function(e) {
        e.preventDefault();
        const d = dirMap[dir];
        if (d) setDirection(d.dx, d.dy);
    });
});

// ---------- RESTART ----------
restartTopBtn.addEventListener('click', restartGame);
restartOverlayBtn.addEventListener('click', restartGame);

// ---------- PREVENT SCROLL ----------
document.addEventListener('touchmove', function(e) {
    if (e.target.closest('.container')) e.preventDefault();
}, { passive: false });

// ---------- INIT ----------
loadHighScore();
initGame();
gameLoop = setInterval(update, TICK_INTERVAL);
document.addEventListener('keydown', handleKey);

console.log('🐍 Snake Game v1.2.0 (Wrap-Around) by KnoX | Good Luck <3');
</script>
</body>
</html>
