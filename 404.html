<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Dillimore</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
                   CSS VARIABLES
                ============================================================ */
        :root {
            --bg-body: #0f0e17;
            --bg-container: #1a1932;
            --bg-card-border: #2a2a4a;
            --text-primary: #fffffe;
            --text-secondary: #a7a9be;
            --text-muted: #6c6e8a;
            --accent-1: #ff8906;
            --accent-2: #e53170;
            --accent-3: #6246d4;
            --accent-glow: rgba(255, 137, 6, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ============================================================
                   RESET & BASE
                ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .container {
            background: var(--bg-container);
            border: 1px solid var(--bg-card-border);
            border-radius: var(--radius);
            padding: 48px 36px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        /* Glow effect */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
        }

        /* ============================================================
                   CONTENT
                ============================================================ */
        .container .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
            position: relative;
        }

        .container .code {
            color: var(--accent-1);
            font-size: 80px;
            font-weight: 800;
            letter-spacing: 4px;
            line-height: 1;
            position: relative;
        }

        .container .code .sub {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 2px;
            display: block;
            margin-top: 4px;
        }

        .container h2 {
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 700;
            margin: 12px 0 8px;
            position: relative;
        }

        .container h2 .highlight {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container p {
            color: var(--text-muted);
            font-size: 15px;
            margin: 8px 0 24px;
            position: relative;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ============================================================
                   BUTTON
                ============================================================ */
        .btn-back {
            display: inline-block;
            padding: 12px 32px;
            background: transparent;
            border: 2px solid var(--accent-1);
            border-radius: 100px;
            color: var(--accent-1);
            font-family: var(--font);
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all var(--transition);
            letter-spacing: 0.5px;
            position: relative;
        }

        .btn-back:hover {
            background: var(--accent-1);
            color: var(--bg-body);
            box-shadow: 0 0 40px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-back:active {
            transform: scale(0.95);
        }

        /* ============================================================
                   FOOTER
                ============================================================ */
        .footer {
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid var(--bg-card-border);
            color: var(--text-muted);
            font-size: 10px;
            letter-spacing: 0.5px;
            opacity: 0.5;
            position: relative;
        }

        .footer .brand {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }

        /* ============================================================
                   RESPONSIVE
                ============================================================ */
        @media (max-width: 480px) {
            .container {
                padding: 32px 20px 28px;
                border-radius: 16px;
            }

            .container .code {
                font-size: 56px;
            }

            .container .code .sub {
                font-size: 15px;
            }

            .container h2 {
                font-size: 20px;
            }

            .container .icon {
                font-size: 48px;
            }

            .container p {
                font-size: 13px;
            }

            .btn-back {
                padding: 10px 24px;
                font-size: 13px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 24px 16px 20px;
            }

            .container .code {
                font-size: 42px;
            }

            .container h2 {
                font-size: 17px;
            }

            .container .icon {
                font-size: 36px;
            }

            .container p {
                font-size: 12px;
            }

            .btn-back {
                padding: 8px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ICON -->
        <span class="icon">🚀</span>

        <!-- CODE -->
        <div class="code">
            404
            <span class="sub">Page Not Found</span>
        </div>

        <!-- TITLE -->
        <h2>
            <span class="highlight">Lost in Space</span>
        </h2>

        <!-- DESCRIPTION -->
        <p>
            The page you're looking for has gone to a galaxy far, far away...
        </p>

        <!-- BUTTON -->
        <a href="/" class="btn-back">⬅ Back to Lobby</a>

        <!-- FOOTER -->
        <div class="footer">
            <span class="brand">Dillimore</span> — Built with ❤️ by <span class="brand">KnoX</span>
            <br>© 2024-2026 Dillimore Team. All rights reserved.
        </div>

    </div>

</body>
</html>
